{
  "seed": 42,
  "device": "cuda",
  "datasets": {
    "fivek": {
      "input_dir": "/path/to/fivek/input",
      "style_dir": "/path/to/fivek/expert_c",
      "image_extensions": [".jpg", ".jpeg", ".png"],
      "train_count": 4500,
      "val_count": 500
    }
  },
  "model": {
    "vgg_checkpoint_path": "../checkpoints/vgg_normalised.pth"
  },
  "training": {
    "batch_size": 2,
    "new_size": 512,
    "crop_size": 256,
    "num_workers": 0,
    "pin_memory": false,
    "win_radius": 1,
    "iterations": 160000,
    "lr": 0.0001,
    "lr_decay": 0.00005,
    "style_weight": 1.0,
    "content_weight": 0.0,
    "lap_weight": 1200.0,
    "rec_weight": 10.0,
    "grad_clip_norm": 5.0,
    "lap_gradient_clip": 0.05,
    "output_dir": "../outputs/train_fivek",
    "resume_from": null,
    "checkpoint_every": 10000,
    "image_every": 1000,
    "log_every": 10,
    "validation_every": 10000,
    "validation_render_limit": 4
  },
  "validation": {
    "new_size": 512,
    "crop_size": 256,
    "crop_mode": "center",
    "enable_lpips": true
  }
}
